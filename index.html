<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="base:app_id" content="69f363cdbc8c9889b5bf9346">
    <title>Neon Color Switch - Premium Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --yellow: #ffee00;
            --magenta: #ff00ff;
            --purple: #9d00ff;
            --bg: #050505;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: white;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff 0%, var(--cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.5));
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            line-height: 1;
        }

        .score-display {
            position: absolute;
            top: 40px;
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
        }

        .btn {
            margin-top: 40px;
            padding: 20px 60px;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.4);
        }

        .btn:hover::after {
            left: 100%;
        }

        .stats-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
        }

        #best-score {
            color: var(--yellow);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="score-display" id="score">0</div>

        <canvas id="gameCanvas"></canvas>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>COLOR<br>SWITCH</h1>
            <p class="stats-text">TAP TO JUMP THROUGH MATCHING COLORS</p>
            <button class="btn" id="start-btn">Play Now</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <h1>CRASHED</h1>
            <p class="stats-text">SCORE: <span id="final-score" style="color:white">0</span></p>
            <p class="stats-text">BEST: <span id="best-score">0</span></p>
            <button class="btn" id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        /**
         * AUDIO SYSTEM (Web Audio API)
         * Generates high-quality procedural sound effects
         */
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'score') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'death') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        const COLORS = ['#00f2ff', '#ffee00', '#ff00ff', '#9d00ff'];
        const GRAVITY = 0.28;
        const JUMP_FORCE = -6.5;
        const OBSTACLE_SPACING = 450;

        let width, height, ball, obstacles, colorChangers, particles;
        let score = 0, bestScore = localStorage.getItem('cs_best') || 0;
        let gameRunning = false, cameraY = 0, targetCameraY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y - cameraY, 4, 4);
                ctx.globalAlpha = 1;
            }
        }

        class Ball {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = width / 2;
                this.y = height * 0.75;
                this.radius = 12;
                this.velocity = 0;
                this.colorIndex = Math.floor(Math.random() * 4);
                this.color = COLORS[this.colorIndex];
                this.trail = [];
            }
            jump() {
                this.velocity = JUMP_FORCE;
                playSound('jump');
            }
            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                if (this.y - cameraY > height + 100) gameOver();
            }
            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y - cameraY, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();
                // Shine
                ctx.beginPath();
                ctx.arc(this.x - 4, this.y - cameraY - 4, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();
                ctx.restore();
            }
        }

        class Obstacle {
            constructor(y, type) {
                this.y = y;
                this.type = type || (Math.random() > 0.5 ? 'circle' : 'square');
                this.size = 100;
                this.rotation = 0;
                this.rotationSpeed = (0.02 + Math.random() * 0.02) * (Math.random() > 0.5 ? 1 : -1);
                this.passed = false;
            }
            update() {
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.lineWidth = 18;
                ctx.lineCap = 'round';
                ctx.save();
                ctx.translate(width / 2, this.y - cameraY);
                ctx.rotate(this.rotation);

                if (this.type === 'circle') {
                    for (let i = 0; i < 4; i++) {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size, i * Math.PI / 2 + 0.1, (i + 1) * Math.PI / 2 - 0.1);
                        ctx.strokeStyle = COLORS[i];
                        ctx.stroke();
                    }
                } else {
                    const s = this.size;
                    const pts = [
                        { x1: -s, y1: -s, x2: s, y2: -s }, // Top
                        { x1: s, y1: -s, x2: s, y2: s },   // Right
                        { x1: s, y1: s, x2: -s, y2: s },   // Bottom
                        { x1: -s, y1: s, x2: -s, y2: -s }  // Left
                    ];
                    pts.forEach((p, i) => {
                        ctx.beginPath();
                        ctx.moveTo(p.x1, p.y1);
                        ctx.lineTo(p.x2, p.y2);
                        ctx.strokeStyle = COLORS[i];
                        ctx.stroke();
                    });
                }
                ctx.restore();
            }
            checkCollision(ball) {
                const dy = ball.y - this.y;
                const dx = ball.x - width / 2;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Precise collision for matching color
                if (Math.abs(dist - this.size) < 18) {
                    let angle = Math.atan2(dy, dx) - this.rotation;
                    while (angle < 0) angle += Math.PI * 2;
                    let colorIdx = Math.floor((angle / (Math.PI * 2)) * 4) % 4;
                    if (COLORS[colorIdx] !== ball.color) return true;
                }

                if (!this.passed && ball.y < this.y - this.size - 20) {
                    this.passed = true;
                    score++;
                    scoreEl.innerText = score;
                    playSound('score');
                }
                return false;
            }
        }

        class ColorChanger {
            constructor(y) {
                this.y = y;
                this.radius = 18;
                this.rotation = 0;
                this.picked = false;
            }
            draw() {
                if (this.picked) return;
                this.rotation += 0.05;
                ctx.save();
                ctx.translate(width / 2, this.y - cameraY);
                ctx.rotate(this.rotation);
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, this.radius, i * Math.PI / 2, (i + 1) * Math.PI / 2);
                    ctx.fillStyle = COLORS[i];
                    ctx.fill();
                }
                ctx.restore();
            }
            check(ball) {
                if (this.picked) return false;
                const d = Math.hypot(ball.x - width / 2, ball.y - this.y);
                if (d < this.radius + ball.radius) {
                    this.picked = true;
                    let next;
                    do { next = COLORS[Math.floor(Math.random() * 4)]; } while (next === ball.color);
                    ball.color = next;

                    // Add Pass Particles
                    for (let i = 0; i < 15; i++) {
                        particles.push(new Particle(width / 2, this.y, ball.color));
                    }

                    return true;
                }
                return false;
            }
        }

        function init() {
            ball = new Ball();
            obstacles = [];
            colorChangers = [];
            particles = [];
            score = 0;
            cameraY = 0;
            targetCameraY = 0;
            scoreEl.innerText = '0';
            for (let i = 0; i < 4; i++) spawn(height * 0.3 - i * OBSTACLE_SPACING);
        }

        function spawn(y) {
            obstacles.push(new Obstacle(y));
            colorChangers.push(new ColorChanger(y + OBSTACLE_SPACING / 2));
        }

        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            playSound('death');
            for (let i = 0; i < 20; i++) particles.push(new Particle(ball.x, ball.y, ball.color));

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('cs_best', bestScore);
            }

            finalScoreEl.innerText = score;
            bestScoreEl.innerText = bestScore;
            setTimeout(() => gameOverScreen.classList.remove('hidden'), 500);
        }

        function loop() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            if (gameRunning) {
                ball.update();
                if (ball.y < targetCameraY + height * 0.6) {
                    targetCameraY = ball.y - height * 0.6;
                }
                cameraY += (targetCameraY - cameraY) * 0.1;

                obstacles.forEach(o => {
                    o.update();
                    if (o.checkCollision(ball)) gameOver();
                });
                colorChangers.forEach(c => c.check(ball));

                if (obstacles[0] && obstacles[0].y - cameraY > height + 200) {
                    obstacles.shift();
                    colorChangers.shift();
                    spawn(obstacles[obstacles.length - 1].y - OBSTACLE_SPACING);
                }
            }

            colorChangers.forEach(c => c.draw());
            obstacles.forEach(o => o.draw());
            ball.draw();
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }

        function handleTap(e) {
            if (e) e.preventDefault();
            if (gameRunning) ball.jump();
        }

        window.addEventListener('mousedown', handleTap);
        window.addEventListener('touchstart', handleTap, { passive: false });

        document.getElementById('start-btn').onclick = (e) => {
            e.stopPropagation();
            startScreen.classList.add('hidden');
            gameRunning = true;
            init();
        };

        document.getElementById('restart-btn').onclick = (e) => {
            e.stopPropagation();
            gameOverScreen.classList.add('hidden');
            init();
            gameRunning = true;
        };

        loop();
    </script>
</body>

</html>
