<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Flap - Modern Arcade Adventure</title>
    <meta name="description" content="A simple, addictive, mobile-friendly Flappy Bird style game built with HTML5 Canvas.">
    <style>
        :root {
            --primary: #FFD93D;
            --secondary: #6BCB77;
            --danger: #FF6B6B;
            --sky: #4D96FF;
            --text: #2B2B2B;
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            background: linear-gradient(to bottom, #4D96FF, #A0E9FF);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        @media (min-width: 401px) {
            #game-container {
                border-radius: 20px;
                height: 90vh;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 20px;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 300px;
            width: 100%;
            transform: translateY(0);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF9F29, #FFD93D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(107, 203, 119, 0.4);
            width: 100%;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(107, 203, 119, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #score-display {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
            pointer-events: none;
        }

        .stats {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .game-over-title {
            color: var(--danger);
            background: none;
            -webkit-text-fill-color: var(--danger);
        }

        /* Instructions */
        .instructions {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">0</div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div class="card">
                <h1>Sky Flap</h1>
                <p>Tap to jump and avoid the pipes!</p>
                <button id="start-btn" class="btn">START GAME</button>
                <div class="instructions">Tap or Space to Jump</div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="card">
                <h1 class="game-over-title">Game Over</h1>
                <div class="stats">
                    Score: <span id="final-score">0</span>
                </div>
                <div class="stats" style="margin-bottom: 20px;">
                    Best: <span id="high-score">0</span>
                </div>
                <button id="restart-btn" class="btn">TRY AGAIN</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreText = document.getElementById('final-score');
        const highScoreText = document.getElementById('high-score');

        // Game Constants
        const GRAVITY = 0.25;
        const JUMP = -5.5;
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 160;
        const PIPE_MIN_HEIGHT = 50;
        const INITIAL_SPEED = 2.5;

        // Game State
        let gameState = 'START';
        let score = 0;
        let highScore = localStorage.getItem('skyflap_highscore') || 0;
        let animationId;
        let gameSpeed = INITIAL_SPEED;

        // Bird Object
        const bird = {
            x: 50,
            y: 0,
            radius: 15,
            velocity: 0,
            rotation: 0,
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Body
                ctx.beginPath();
                ctx.roundRect(-18, -15, 36, 30, 10);
                ctx.fillStyle = '#FFD93D';
                ctx.fill();
                ctx.strokeStyle = '#2B2B2B';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Wing
                ctx.beginPath();
                ctx.roundRect(-10, 0, 15, 10, 5);
                ctx.fillStyle = '#FFF';
                ctx.fill();
                ctx.stroke();

                // Eye
                ctx.beginPath();
                ctx.arc(8, -5, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#FFF';
                ctx.fill();
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(10, -5, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();

                // Beak
                ctx.beginPath();
                ctx.moveTo(18, -2);
                ctx.lineTo(25, 3);
                ctx.lineTo(18, 8);
                ctx.fillStyle = '#FF6B6B';
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },
            update() {
                if (gameState === 'PLAYING') {
                    this.velocity += GRAVITY;
                    this.y += this.velocity;
                    this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, this.velocity * 0.1));

                    // Ground collision
                    if (this.y + this.radius > canvas.height - 50) {
                        this.y = canvas.height - 50 - this.radius;
                        gameOver();
                    }
                    // Ceiling collision
                    if (this.y - this.radius < 0) {
                        this.y = this.radius;
                        this.velocity = 0;
                    }
                }
            }
        };

        // Pipes Array
        let pipes = [];

        function createPipe() {
            const gapY = Math.random() * (canvas.height - 300) + 100;
            pipes.push({
                x: canvas.width,
                gapY: gapY,
                passed: false
            });
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.fillStyle = '#6BCB77';
                ctx.strokeStyle = '#2B2B2B';
                ctx.lineWidth = 2;

                // Top Pipe
                ctx.beginPath();
                ctx.roundRect(pipe.x, 0, PIPE_WIDTH, pipe.gapY - PIPE_GAP/2, [0, 0, 8, 8]);
                ctx.fill();
                ctx.stroke();
                
                // Top Pipe Lip
                ctx.beginPath();
                ctx.roundRect(pipe.x - 5, pipe.gapY - PIPE_GAP/2 - 20, PIPE_WIDTH + 10, 20, 4);
                ctx.fill();
                ctx.stroke();

                // Bottom Pipe
                ctx.beginPath();
                ctx.roundRect(pipe.x, pipe.gapY + PIPE_GAP/2, PIPE_WIDTH, canvas.height - (pipe.gapY + PIPE_GAP/2), [8, 8, 0, 0]);
                ctx.fill();
                ctx.stroke();

                // Bottom Pipe Lip
                ctx.beginPath();
                ctx.roundRect(pipe.x - 5, pipe.gapY + PIPE_GAP/2, PIPE_WIDTH + 10, 20, 4);
                ctx.fill();
                ctx.stroke();
            });
        }

        function updatePipes() {
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                createPipe();
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= gameSpeed;

                // Collision Detection
                if (
                    bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + PIPE_WIDTH &&
                    (bird.y - bird.radius < pipe.gapY - PIPE_GAP/2 || bird.y + bird.radius > pipe.gapY + PIPE_GAP/2)
                ) {
                    gameOver();
                }

                // Score increment
                if (!pipe.passed && bird.x > pipe.x + PIPE_WIDTH) {
                    pipe.passed = true;
                    score++;
                    scoreDisplay.innerText = score;
                    playSound('score');
                    
                    // Difficulty Increase
                    if (score % 5 === 0) {
                        gameSpeed += 0.2;
                    }
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(index, 1);
                }
            });
        }

        // Environment
        let groundX = 0;
        function drawEnvironment() {
            // Clouds/Background elements could be here
            
            // Ground
            ctx.fillStyle = '#4D4545';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#6BCB77';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 10);
            
            // Moving ground lines for speed effect
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            groundX = (groundX - gameSpeed) % 40;
            for (let x = groundX; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 30);
                ctx.lineTo(x + 20, canvas.height - 30);
                ctx.stroke();
            }
        }

        // Sound System (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'jump') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'score') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Game Loops
        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            // Controls
            const handleAction = (e) => {
                if (e.type === 'keydown' && e.code !== 'Space') return;
                
                if (gameState === 'PLAYING') {
                    bird.velocity = JUMP;
                    playSound('jump');
                } else if (gameState === 'START') {
                    startGame();
                }
            };

            window.addEventListener('mousedown', handleAction);
            window.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleAction(e);
            }, { passive: false });
            window.addEventListener('keydown', handleAction);

            startBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                startGame();
            });
            
            restartBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetGame();
                startGame();
            });

            loop();
        }

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            bird.x = canvas.width / 4;
            bird.y = canvas.height / 2;
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameState = 'PLAYING';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
        }

        function gameOver() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            playSound('hit');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('skyflap_highscore', highScore);
            }
            
            finalScoreText.innerText = score;
            highScoreText.innerText = highScore;
            gameOverScreen.classList.remove('hidden');
        }

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = '0';
            pipes = [];
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            bird.rotation = 0;
            gameSpeed = INITIAL_SPEED;
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'PLAYING') {
                updatePipes();
                bird.update();
            }
            
            drawPipes();
            drawEnvironment();
            bird.draw();
            
            animationId = requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
